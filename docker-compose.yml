name: symfony-dev

services:
  php:
    build: .
    ports:
      - "${PHP_HTTP_PORT:-8080}:80"
      - "${PHP_HTTPS_PORT:-8443}:443"
    volumes:
      - ./symfony:/app
    env_file:
      - ./symfony/.env.local
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

volumes:
  db_data:
