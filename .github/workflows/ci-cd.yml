name: CI/CD Symfony

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    name: Tests PHPUnit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, pdo_mysql, zip, apcu
          coverage: none

      - name: Install dependencies
        run: cd symfony && composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: cd symfony && php vendor/bin/phpunit

  deploy:
    name: Deploy Production
    runs-on: self-hosted
    needs: tests
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy to production
        run: |
          cd ${{ secrets.DEPLOY_PATH }}

          PREVIOUS_COMMIT=$(git rev-parse HEAD)

          git pull origin master

          if ! docker compose exec -T php composer install --no-dev --optimize-autoloader; then
            echo "ERREUR composer install - rollback..."
            git reset --hard $PREVIOUS_COMMIT
            exit 1
          fi

          if ! docker compose exec -T php php bin/console doctrine:migrations:migrate --no-interaction; then
            echo "ERREUR migrations - rollback..."
            git reset --hard $PREVIOUS_COMMIT
            docker compose exec -T php composer install --no-dev --optimize-autoloader
            exit 1
          fi

          if ! docker compose exec -T php php bin/console cache:warmup; then
            echo "ERREUR cache:warmup - rollback..."
            git reset --hard $PREVIOUS_COMMIT
            docker compose exec -T php composer install --no-dev --optimize-autoloader
            exit 1
          fi

          echo "Deploy termine avec succes !"
