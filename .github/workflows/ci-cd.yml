name: CI/CD Symfony

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    name: Tests PHPUnit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, pdo_mysql, zip, apcu
          coverage: none

      - name: Install dependencies
        run: cd symfony && composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: cd symfony && php vendor/bin/phpunit

  deploy:
    name: Deploy Production
    runs-on: self-hosted
    needs: tests
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy to production
        run: |
          cd ${{ secrets.DEPLOY_PATH }}
          git pull origin master
          docker compose -f docker-compose.prod.yml --env-file .env.compose exec -T php composer install --no-dev --optimize-autoloader
          docker compose -f docker-compose.prod.yml --env-file .env.compose exec -T php php bin/console doctrine:migrations:migrate --no-interaction
          docker compose -f docker-compose.prod.yml --env-file .env.compose exec -T php php bin/console cache:warmup
